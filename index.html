<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        
        /* Экран защиты */
        #lock-screen {
            display: flex; height: 100vh; background: #000; color: white;
            align-items: center; justify-content: center; position: fixed; width: 100%; z-index: 1000;
        }

        /* Экран ввода */
        #input-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; color: white; background: #1a1a1a; position: absolute; width: 100%; z-index: 100;
        }
        input { 
            padding: 15px; font-size: 18px; border-radius: 10px; border: none; 
            margin-bottom: 10px; width: 80%; max-width: 300px;
        }
        button {
            padding: 15px 40px; font-size: 18px; background: #007AFF; color: white;
            border: none; border-radius: 10px; cursor: pointer;
        }

        /* Основной экран */
        #main-screen { display: none; position: relative; width: 100vw; height: 100vh; }
        #bg { width: 100%; height: 100%; object-fit: cover; }
        
        .label { position: absolute; left: 50px; pointer-events: none; }
        #text1 { top: 100px; color: black; font-size: 40px; }
        #text2 { top: 150px; color: black; font-size: 40px; font-weight: bold; }
        #text3 { top: 200px; color: #969696; font-size: 28px; }

        #object {
            position: absolute;
            top: 300px; /* Высота под текстом */
            left: 50%;
            transform: translateX(-50%);
            width: 250px; 
            height: 60px; /* Сжато по вертикали */
            transition: transform 0.1s linear;
        }

        .rotating { animation: flip 0.8s linear infinite; }
        @keyframes flip {
            from { transform: translateX(-50%) rotateY(0deg); }
            to { transform: translateX(-50%) rotateY(360deg); }
        }
    </style>
</head>
<body>

    <!-- Слой блокировки -->
    <div id="lock-screen"><h1>Загрузка...</h1></div>

    <!-- Интерфейс ввода -->
    <div id="input-screen" style="display: none;">
        <input type="text" id="in1" placeholder="Первый текст">
        <input type="text" id="in2" placeholder="Второй текст">
        <input type="text" id="in3" placeholder="Третий текст">
        <button onclick="start()">Запустить</button>
    </div>

    <!-- Основной интерфейс -->
    <div id="main-screen">
        <img src="bg.png" id="bg">
        <div id="text1" class="label"></div>
        <div id="text2" class="label"></div>
        <div id="text3" class="label"></div>
        <img src="object.png" id="object" onclick="this.classList.toggle('rotating')">
    </div>

    <script>
        // --- ПРОВЕРКА ПАРОЛЯ ---
        // Замени слово МОЙ_ПАРОЛЬ на свое
        const PASS = "1234"; 
        
        window.onload = function() {
            let userPass = prompt("Введите доступ:");
            if (userPass === PASS) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('input-screen').style.display = 'flex';
            } else {
                document.getElementById('lock-screen').innerHTML = "<h1>Доступ закрыт</h1>";
            }
        };

        function start() {
            document.getElementById('text1').innerText = document.getElementById('in1').value;
            document.getElementById('text2').innerText = document.getElementById('in2').value;
            document.getElementById('text3').innerText = document.getElementById('in3').value;
            
            document.getElementById('input-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
        }
    </script>
</body>
</html>
