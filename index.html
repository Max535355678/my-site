<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        
        #lock-screen {
            display: flex; height: 100vh; background: #000; color: white;
            align-items: center; justify-content: center; position: fixed; width: 100%; z-index: 1000;
        }

        #input-screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; color: white; background: #1a1a1a; position: absolute; width: 100%; z-index: 100;
        }
        input { 
            padding: 12px; font-size: 16px; border-radius: 8px; border: none; 
            margin-bottom: 10px; width: 80%; max-width: 250px;
        }
        button {
            padding: 12px 30px; font-size: 16px; background: #007AFF; color: white;
            border: none; border-radius: 10px; cursor: pointer;
        }

        #main-screen { display: none; position: relative; width: 100vw; height: 100vh; }
        #bg { width: 100%; height: 100%; object-fit: cover; }
        
        /* Текст смещен влево до 20px */
        .label { position: absolute; left: 20px; pointer-events: none; }
        #text1 { top: 100px; color: black; font-size: 20px; }
        #text2 { top: 130px; color: black; font-size: 20px; font-weight: bold; }
        #text3 { top: 160px; color: #969696; font-size: 14px; }

        /* Объект увеличен */
        #object {
            position: absolute;
            top: 250px; 
            left: 50%;
            transform: translateX(-50%);
            width: 350px; 
            height: 140px; 
            cursor: pointer;
        }

        /* Скорость вращения уменьшена (2 секунды вместо 0.8) */
        .rotating { animation: flip 2.0s ease-out 1 forwards; }
        @keyframes flip {
            from { transform: translateX(-50%) rotateY(0deg); }
            to { transform: translateX(-50%) rotateY(360deg); }
        }
    </style>
</head>
<body>

    <div id="lock-screen"><h1>Загрузка...</h1></div>

    <div id="input-screen">
        <input type="text" id="in1" placeholder="Текст 1 (обычный)">
        <input type="text" id="in2" placeholder="Текст 2 (жирный)">
        <input type="text" id="in3" placeholder="Текст 3 (серый)">
        <button onclick="start()">Запустить</button>
    </div>

    <div id="main-screen">
        <img src="bg.png" id="bg" alt="background">
        <div id="text1" class="label"></div>
        <div id="text2" class="label"></div>
        <div id="text3" class="label"></div>
        <img src="object.png" id="object" onclick="runAnimation()" alt="object">
    </div>

    <script>
        const PASS = "1234"; 
        
        window.onload = function() {
            setTimeout(() => {
                let userPass = prompt("Введите доступ:");
                if (userPass === PASS) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('input-screen').style.display = 'flex';
                } else {
                    document.getElementById('lock-screen').innerHTML = "<h1>Доступ закрыт</h1>";
                }
            }, 500);
        };

        function start() {
            document.getElementById('text1').innerText = document.getElementById('in1').value;
            document.getElementById('text2').innerText = document.getElementById('in2').value;
            document.getElementById('text3').innerText = document.getElementById('in3').value;
            
            document.getElementById('input-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
        }

        function runAnimation() {
            const obj = document.getElementById('object');
            obj.classList.remove('rotating');
            void obj.offsetWidth; 
            obj.classList.add('rotating');
        }
    </script>
</body>
</html>
